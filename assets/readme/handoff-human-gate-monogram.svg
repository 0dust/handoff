<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Handoff human gate monogram</title>
  <desc id="desc">A compact Handoff H mark built from agent brackets, a packet, and an approval gate.</desc>
  <defs>
    <linearGradient id="bg" x1="88" x2="424" y1="64" y2="448" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f7f4ec"/>
      <stop offset="1" stop-color="#e8f2ef"/>
    </linearGradient>
    <linearGradient id="packet" x1="176" x2="336" y1="188" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff5d6"/>
      <stop offset="1" stop-color="#e7a938"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#171412" flood-opacity="0.16"/>
    </filter>
    <style>
      .outer { fill: url(#bg); stroke: #cfc6b8; }
      .ink { fill: #26231f; }
      .teal { stroke: #2f8f88; }
      .amber { fill: #d99a2b; }
      @media (prefers-color-scheme: dark) {
        .outer { fill: #171a19; stroke: #5f695f; }
        .ink { fill: #f2efe7; }
      }
    </style>
  </defs>

  <rect x="48" y="48" width="416" height="416" rx="88" class="outer" stroke-width="8"/>

  <g filter="url(#shadow)">
    <path d="M148 128H96V384H148" fill="none" class="teal" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M364 128H416V384H364" fill="none" class="teal" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="176" y="188" width="160" height="112" rx="10" fill="url(#packet)" stroke="#936b20" stroke-width="6"/>
    <path d="M184 202L256 256L328 202" fill="none" stroke="#936b20" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="232" y="94" width="48" height="300" rx="24" class="ink"/>
    <rect x="128" y="232" width="256" height="48" rx="24" class="ink"/>

    <circle cx="256" cy="256" r="50" fill="#fffaf0" stroke="#d99a2b" stroke-width="8"/>
    <path d="M234 256L250 272L280 238" fill="none" stroke="#2f8f88" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <circle cx="118" cy="384" r="12" class="amber"/>
  <circle cx="394" cy="128" r="12" class="amber"/>
</svg>
